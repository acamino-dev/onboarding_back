openapi: 3.0.3
info:
  title: requestCreditHistory
  version: 1.0.0

paths:
  /home/credit:
    post:
      summary: Verify RFC against JWT credentials, enforce 30-day cooldown, and return credit history
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestBody'
      responses:
        "200":
          description: Credit history retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        "400":
          description: Error — check errorCode for the specific failure reason
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    RequestBody:
      type: object
      required:
        - rfc
      properties:
        rfc:
          type: string
          description: Mexican RFC — 12 or 13 characters
          pattern: '^[A-ZÑ&]{3,4}[0-9]{6}[A-Z0-9]{3}$'
          example: GOAM860519H45

    SuccessResponse:
      oneOf:
        - type: object
          description: Employee has credit history
          required:
            - history
            - operator
            - activeCredit
            - balance
            - company
            - creditHistory
            - frequency
            - daysPastDue
            - antiguedad
          properties:
            history:
              type: boolean
              enum: [true]
            operator:
              type: boolean
            activeCredit:
              type: boolean
            balance:
              type: number
            company:
              type: string
            creditHistory:
              type: array
              items:
                type: object
            frequency:
              type: number
            daysPastDue:
              type: number
            antiguedad:
              type: number
        - type: object
          description: Employee has no credit history
          required:
            - history
          properties:
            history:
              type: boolean
              enum: [false]
            operator:
              nullable: true
            activeCredit:
              nullable: true
            balance:
              nullable: true
            company:
              nullable: true
            creditHistory:
              nullable: true
            frequency:
              nullable: true
            daysPastDue:
              nullable: true
            antiguedad:
              nullable: true

    ErrorResponse:
      type: object
      required:
        - errorCode
        - errorId
      properties:
        errorCode:
          type: integer
          description: |
            Internal error code:
            702 – validation error (invalid or missing rfc)
            703 – auth error (rfc does not match JWT user)
            705 – not found (employee record not found)
            707 – rate limit (accessed within last 30 days)
            708 – internal server error
          enum: [702, 703, 705, 707, 708]
        errorId:
          type: string
          description: 8-character hex error ID for tracing
          pattern: '^[0-9a-f]{8}$'
        nextAvailableAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp of next allowed access — only present when errorCode is 707. errorId is absent in this case.
