openapi: 3.0.3
info:
  title: getCreditHistory
  version: 1.0.0

paths:
  /home/getCreditHistory:
    post:
      summary: Scrapes portal and returns client credit history by RFC
      description: |
        Internal Lambda — no API Gateway trigger. Invoked directly via Lambda:InvokeFunction
        by requestCreditHistory. RFC is trusted as already validated and verified by the caller.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestBody'
      responses:
        "200":
          description: Success — returns credit data or history:false if RFC not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        "400":
          description: Error — check errorCode for the specific failure reason
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    RequestBody:
      type: object
      required:
        - rfc
      properties:
        rfc:
          type: string
          description: Mexican RFC with homoclave (12 chars for moral, 13 for física) — format already validated by requestCreditHistory

    Payment:
      type: object
      properties:
        operationDate:
          type: string
          description: Date the payment was processed (DD/MM/YYYY)
        valueDate:
          type: string
          description: Value date of the transaction (DD/MM/YYYY)
        amount:
          type: string
          description: Payment amount as string from portal
        concept:
          type: string
          description: Payment concept, e.g. "PAGO 1 de 12"
        dueDate:
          type: string
          description: Due date for the installment (DD/MM/YYYY)
        paymentType:
          type: string
          description: Type of payment
        invoice:
          type: string
          description: Invoice reference
        capital:
          type: string
          description: Capital component of the payment
        interest:
          type: string
          description: Interest component of the payment
        iva:
          type: string
          description: IVA (tax) component of the payment
        total:
          type: string
          description: Total amount of the payment

    CreditEntry:
      type: object
      properties:
        creditId:
          type: string
          description: Portal credit identifier
        periodicidad:
          type: string
          description: Payment frequency from portal (e.g. "SEMANAL", "QUINCENAL")
        payments:
          type: array
          items:
            $ref: '#/components/schemas/Payment'

    ActiveCreditBalance:
      type: object
      properties:
        creditId:
          type: string
          description: Portal credit identifier
        balance:
          type: number
          description: Remaining balance of the credit
        lastPayment:
          type: string
          nullable: true
          description: Concept of the last recorded payment, e.g. "PAGO 3 de 12"
        nextPaymentDate:
          type: string
          nullable: true
          description: |
            Calculated due date of the next installment (DD/MM/YYYY).
            Derived from the highest-numbered installment's dueDate plus one period
            (7 days for SEMANAL, 15 days for QUINCENAL). Null if no parseable payments.

    SuccessResponse:
      type: object
      properties:
        history:
          type: boolean
          description: false when RFC not found in portal; all other fields are null in that case
        operator:
          type: boolean
          nullable: true
          description: true if employee's puesto (position) is "operador"
        activeCredit:
          type: boolean
          nullable: true
          description: true if at least one credit with status ACTIVO exists
        balance:
          type: array
          nullable: true
          description: One entry per ACTIVO credit. Empty array if no active credits.
          items:
            $ref: '#/components/schemas/ActiveCreditBalance'
        company:
          type: string
          nullable: true
          description: Employee's company name from the portal (empresa field)
        creditHistory:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/CreditEntry'
        frequency:
          type: number
          nullable: true
          description: |
            Max month gap between consecutive credits (ACTIVO or TERMINADO status),
            sorted by first payment date. 0 if fewer than 2 eligible credits.
        daysPastDue:
          type: integer
          nullable: true
          description: |
            Average days past due across all overdue payments, truncated to integer.
            Grace period: 7 days for SEMANAL, 15 days for all others.
            Also accounts for pending installments not yet paid.
            0 if no overdue payments found.
        antiguedad:
          type: number
          nullable: true
          description: Employee seniority as numeric value from portal (txtAntiguedad field)
        acaminoTenure:
          type: integer
          nullable: true
          description: |
            Months elapsed from the oldest fechaPrimerPago across all ACTIVO or TERMINADO
            credits to the current date. Null if no credits with those statuses exist.

    ErrorResponse:
      type: object
      required:
        - errorCode
        - errorId
      properties:
        errorCode:
          type: integer
          description: |
            703 – portal login or session error
            708 – scraping or infrastructure error (includes missing PORTAL_SECRET_ARN)
          enum: [703, 708]
        errorId:
          type: string
          description: 8-character hex error ID for tracing
          pattern: '^[0-9a-f]{8}$'
