openapi: 3.0.3
info:
  title: validateIneBack
  version: 1.0.0

paths:
  /kyc/validate-ine-back:
    post:
      summary: Extract name from INE back with Textract, validate against KYC record, advance step to ADDRESS
      responses:
        "200":
          description: Success — name matches, step advanced to ADDRESS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        "400":
          description: Error — check errorCode for the specific failure reason
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    SuccessResponse:
      type: object
      properties:
        errorCode:
          type: integer
          example: 701

    ErrorResponse:
      type: object
      required:
        - errorCode
        - errorId
      properties:
        errorCode:
          type: integer
          description: |
            Internal error code:
            702 – validation error (document unreadable, s3Key missing, nombre missing in KYC, name mismatch)
            703 – auth error (missing userId)
            704 – forbidden (wrong KYC step)
            705 – not found (KYC process not found)
            708 – generic infrastructure error
          enum: [702, 703, 704, 705, 708]
        errorId:
          type: string
          description: 8-character hex error ID for tracing
          pattern: '^[0-9a-f]{8}$'
