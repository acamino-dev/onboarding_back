openapi: 3.0.3
info:
  title: validateBank
  version: 1.0.0

paths:
  /kyc/validate-bank:
    post:
      summary: Validate bank statement - verify RFC presence in document, extract CLABE/account number, advance step to OTP
      responses:
        "200":
          description: Bank statement validated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        "400":
          description: Error — check `errorCode` for the specific failure reason
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    SuccessResponse:
      type: object
      properties:
        errorCode:
          type: integer
          example: 701

    ErrorResponse:
      type: object
      required:
        - errorCode
        - errorId
      properties:
        errorCode:
          type: integer
          description: |
            Internal error code:
            702 – validation error (missing s3Key, missing RFC in KYC record, RFC not found in bank statement, account number not extractable)
            703 – auth error (missing userId)
            704 – forbidden (wrong KYC step)
            705 – not found (KYC record not found)
            708 – internal server error
          enum: [702, 703, 704, 705, 708]
        errorId:
          type: string
          description: 8-character hex error ID for tracing
          pattern: '^[0-9a-f]{8}$'
