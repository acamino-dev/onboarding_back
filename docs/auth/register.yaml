openapi: 3.0.3
info:
  title: register-service
  version: 1.0.0
  description: >
    Validates an employee against HR data and creates a user account.
    The employee must exist and be active, belong to the given company,
    and have no existing user account. RFC is cross-checked against the HR record.

paths:
  /auth/register:
    post:
      summary: Register a new user account for an employee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestBody"
      responses:
        "201":
          description: Account created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Error — see errorCode for details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    RequestBody:
      type: object
      required:
        - employee_number
        - company_id
        - rfc
        - email
        - password
      properties:
        employee_number:
          type: string
          minLength: 1
          maxLength: 100
          description: HR employee number
        company_id:
          type: string
          format: uuid
          description: UUID of the company the employee belongs to
        rfc:
          type: string
          minLength: 13
          maxLength: 13
          description: Mexican tax ID (RFC) — must match the employee record exactly
        email:
          type: string
          format: email
          description: Email address for the new account — must be unique across all users
        password:
          type: string
          minLength: 8
          maxLength: 72
          description: Plain-text password — salt from ONBOARDING_SALT_SECRET_ID appended before bcrypt (10 rounds)

    SuccessResponse:
      type: object
      properties:
        message:
          type: string
          example: Account created successfully

    ErrorResponse:
      type: object
      required:
        - errorCode
        - errorId
      properties:
        errorCode:
          type: integer
          description: |
            Internal error code:
            702 – bad request (empty body, invalid JSON, missing or invalid fields)
            705 – not found (company or employee does not exist, employee is inactive, or RFC mismatch)
            708 – internal server error (unexpected DB or infrastructure failure)
            709 – conflict (email already registered)
          enum: [702, 705, 708, 709]
        errorId:
          type: string
          description: 8-character hex error ID for tracing
          pattern: "^[0-9a-f]{8}$"
          example: a3f1c20b
