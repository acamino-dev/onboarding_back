openapi: 3.0.3
info:
  title: resetPassword
  version: 1.0.0

paths:
  /auth/resetPassword:
    post:
      summary: Validates recovery OTP and updates user password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestBody'
      responses:
        "200":
          description: Password reset successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        "400":
          description: Error — check `errorCode` for the specific failure reason
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    RequestBody:
      type: object
      required:
        - email
        - code
        - password
      properties:
        email:
          type: string
          format: email
          example: john.doe@company.com
        code:
          type: string
          pattern: '^\d{6}$'
          description: 6-digit OTP received via email
          example: "482931"
        password:
          type: string
          minLength: 8
          maxLength: 72
          description: New password
          example: NewSecure123

    SuccessResponse:
      type: object
      properties:
        message:
          type: string
          example: Password reset successfully

    ErrorResponse:
      type: object
      required:
        - errorCode
        - errorId
      properties:
        errorCode:
          type: integer
          description: |
            Internal error code:
            702 – validation error (missing/invalid fields)
            703 – OTP expired
            705 – user or OTP not found
            708 – internal server error
            709 – OTP already used
            711 – user email not verified
          enum: [702, 703, 705, 708, 709, 711]
        errorId:
          type: string
          description: 8-character hex error ID for tracing
          pattern: '^[0-9a-f]{8}$'
          example: a1b2c3d4
