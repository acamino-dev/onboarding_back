openapi: 3.0.3
info:
  title: validateCredentials (Lambda Authorizer)
  description: |
    Internal Lambda authorizer attached to API Gateway — not a public HTTP endpoint.
    Runs before every protected route. Returns isAuthorized to API Gateway; on success
    injects userId, email, and companyId into the request context for downstream lambdas.
  version: 2.0.0

components:
  securitySchemes:
    CredentialsAuthorizer:
      type: http
      scheme: bearer
      description: |
        API Gateway Lambda authorizer (simple response mode, payload format 2.0).
        Reads Authorization header and refreshToken cookie. Validates JWT signature,
        expiry, and refresh token binding. Denies on any failure — no error body returned.

        Inputs:
          - Authorization: Bearer <accessToken>  (header, required)
          - refreshToken=<value>                 (HttpOnly cookie, required)

        On ALLOW — injects into event.requestContext.authorizer.lambda:
          - userId:    string (UUID, from JWT sub)
          - email:     string (from JWT payload)
          - companyId: string (UUID, from JWT payload)

        On DENY — API Gateway returns 403 with no body. Triggered by:
          702-equivalent – missing or malformed Authorization header or refreshToken cookie
          703-equivalent – invalid JWT signature, refresh token not found, expired, or userId mismatch
          710-equivalent – access token expired
          env misconfiguration – JWT_SECRET_ARN or REFRESH_TOKENS_TABLE_NAME not set

        Cache: ReauthorizeEvery=0 (no caching).

  schemas:
    AuthorizerContext:
      type: object
      description: Context injected into downstream lambda event.requestContext.authorizer.lambda
      required:
        - userId
        - email
        - companyId
      properties:
        userId:
          type: string
          format: uuid
          description: User ID from JWT sub claim
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        email:
          type: string
          format: email
          description: Email from JWT payload
          example: jane.doe@company.com
        companyId:
          type: string
          format: uuid
          description: Company ID from JWT payload
          example: b2c3d4e5-f6a7-8901-bcde-f12345678901
