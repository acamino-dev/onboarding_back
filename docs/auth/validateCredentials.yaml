openapi: 3.0.3
info:
  title: validateCredentials
  version: 1.0.0

paths:
  /auth/validateCredentials:
    post:
      summary: Verifies JWT access token and refresh token cookie, returns email from token payload
      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
            pattern: '^Bearer .+'
          description: JWT access token in Bearer format
        - in: cookie
          name: refreshToken
          required: true
          schema:
            type: string
            format: uuid
          description: HttpOnly secure refresh token cookie set by /auth/login
      responses:
        "200":
          description: Both tokens are valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        "400":
          description: Error — check `errorCode` for the specific failure reason
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    SuccessResponse:
      type: object
      properties:
        email:
          type: string
          format: email
          description: Email address from the decoded JWT payload

    ErrorResponse:
      type: object
      required:
        - errorCode
        - errorId
      properties:
        errorCode:
          type: integer
          description: |
            Internal error code:
            702 – missing or malformed Authorization header or refreshToken cookie
            703 – invalid JWT signature or refresh token not found/expired
            708 – infrastructure error (misconfigured env var or AWS service unavailable)
            710 – access token expired
          enum: [702, 703, 708, 710]
        errorId:
          type: string
          description: 8-character hex error ID for tracing
          pattern: '^[0-9a-f]{8}$'
