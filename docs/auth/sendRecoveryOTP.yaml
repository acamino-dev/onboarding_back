openapi: 3.0.3
info:
  title: sendRecoveryOTP
  version: 1.0.0

paths:
  /auth/sendRecoveryOTP:
    post:
      summary: Generate and send a recovery OTP to a verified user's email for password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestBody'
      responses:
        "200":
          description: Recovery OTP sent successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        "400":
          description: Error — check `errorCode` for the specific failure reason
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    RequestBody:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          example: john.doe@company.com

    SuccessResponse:
      type: object
      properties:
        message:
          type: string
          example: OTP sent

    ErrorResponse:
      type: object
      required:
        - errorCode
        - errorId
      properties:
        errorCode:
          type: integer
          description: |
            Internal error code:
            702 – validation error (missing/invalid body or email format)
            705 – user not found
            707 – OTP already sent less than 2 minutes ago
            708 – internal server error
            711 – user email not verified
          enum: [702, 705, 707, 708, 711]
        errorId:
          type: string
          description: 8-character hex error ID for tracing
          pattern: '^[0-9a-f]{8}$'
          example: a1b2c3d4
