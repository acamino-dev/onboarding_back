AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: onboarding-back

Globals:
  Function:
    Runtime: nodejs22.x
    Architectures:
      - x86_64
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        NODE_OPTIONS: --enable-source-maps
    VpcConfig:
      SecurityGroupIds: !Split [",", !Ref LambdaSecurityGroupIds]
      SubnetIds: !Split [",", !Ref LambdaSubnetIds]

Parameters:
  LambdaSubnetIds:
    Type: String
    Description: Comma-separated list of private subnet IDs for Lambda VPC config
  LambdaSecurityGroupIds:
    Type: String
    Description: Comma-separated list of security group IDs for Lambda VPC config
  Environment:
    Type: String
    Description: Deployment environment (Dev, Prod)
    AllowedValues:
      - Dev
      - Prod
    Default: Dev
  FrontendUrl:
    Type: String
    Description: Frontend URL for CORS
    Default: http://localhost:3000

Resources:
  CompaniesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub onboardingCompaniesDB${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  OtpTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub onboardingOtpDB${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: email
          AttributeType: S
        - AttributeName: otp_id
          AttributeType: S
      KeySchema:
        - AttributeName: email
          KeyType: HASH
        - AttributeName: otp_id
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  RefreshTokensTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub onboardingRefreshTokensDB${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: token_hash
          AttributeType: S
      KeySchema:
        - AttributeName: token_hash
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  OnboardingApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      CorsConfiguration:
        AllowOrigins:
          - !Ref FrontendUrl
        AllowHeaders:
          - Content-Type
          - Authorization
          - x-api-key
          - X-Requested-With
        AllowMethods:
          - POST
          - OPTIONS
        AllowCredentials: true

  RegisterFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub onboardingRegister${Environment}
      CodeUri: ./
      Handler: lambdas/auth/register/app.lambdaHandler
      Description: POST /auth/register - validates employee record and creates user account
      Environment:
        Variables:
          DB_SECRET_ID: !Sub onboardingCredentials${Environment}
          ONBOARDING_SALT_SECRET_ID: !Sub onboardingSalt${Environment}
          FRONTEND_URL: !Ref FrontendUrl
          COMPANIES_TABLE_NAME: !Sub onboardingCompaniesDB${Environment}
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource:
                - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:onboardingCredentials${Environment}-*
                - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:onboardingSalt${Environment}-*
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:Scan
              Resource:
                - !GetAtt CompaniesTable.Arn
        - VPCAccessPolicy: {}
      Events:
        Register:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnboardingApi
            Path: /auth/register
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - lambdas/auth/register/app.ts
        External:
          - "@aws-sdk/*"

  GetCompaniesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub onboardingGetCompanies${Environment}
      CodeUri: ./
      Handler: lambdas/auth/getCompanies/app.lambdaHandler
      Description: POST /auth/getCompanies - returns all companies from DynamoDB
      Environment:
        Variables:
          FRONTEND_URL: !Ref FrontendUrl
          COMPANIES_TABLE_NAME: !Sub onboardingCompaniesDB${Environment}
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Scan
              Resource:
                - !GetAtt CompaniesTable.Arn
        - VPCAccessPolicy: {}
      Events:
        GetCompanies:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnboardingApi
            Path: /auth/getCompanies
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - lambdas/auth/getCompanies/app.ts
        External:
          - "@aws-sdk/*"

  SendOTPFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub onboardingSendOTP${Environment}
      CodeUri: ./
      Handler: lambdas/auth/sendOTP/app.lambdaHandler
      Description: POST /auth/sendOTP - generates and sends OTP to user email
      Environment:
        Variables:
          DB_SECRET_ID: !Sub onboardingCredentials${Environment}
          OTP_TABLE_NAME: !Sub onboardingOtpDB${Environment}
          SES_FROM_EMAIL: no-reply@apoyoenelcamino.com.mx
          FRONTEND_URL: !Ref FrontendUrl
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource:
                - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:onboardingCredentials${Environment}-*
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:Query
              Resource:
                - !GetAtt OtpTable.Arn
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
              Resource: "*"
        - VPCAccessPolicy: {}
      Events:
        SendOTP:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnboardingApi
            Path: /auth/sendOTP
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - lambdas/auth/sendOTP/app.ts
        External:
          - "@aws-sdk/*"

  SendRecoveryOTPFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub onboardingSendRecoveryOTP${Environment}
      CodeUri: ./
      Handler: lambdas/auth/sendRecoveryOTP/app.lambdaHandler
      Description: POST /auth/sendRecoveryOTP - generates and sends recovery OTP for password reset
      Environment:
        Variables:
          DB_SECRET_ID: !Sub onboardingCredentials${Environment}
          OTP_TABLE_NAME: !Sub onboardingOtpDB${Environment}
          SES_FROM_EMAIL: no-reply@apoyoenelcamino.com.mx
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource:
                - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:onboardingCredentials${Environment}-*
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:Query
              Resource:
                - !GetAtt OtpTable.Arn
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
              Resource: "*"
        - VPCAccessPolicy: {}
      Events:
        SendRecoveryOTP:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnboardingApi
            Path: /auth/sendRecoveryOTP
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - lambdas/auth/sendRecoveryOTP/app.ts
        External:
          - "@aws-sdk/*"

  VerifyOTPFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub onboardingVerifyOTP${Environment}
      CodeUri: ./
      Handler: lambdas/auth/verifyOTP/app.lambdaHandler
      Description: POST /auth/verifyOTP - verifies OTP code and marks user as verified
      Environment:
        Variables:
          DB_SECRET_ID: !Sub onboardingCredentials${Environment}
          OTP_TABLE_NAME: !Sub onboardingOtpDB${Environment}
          FRONTEND_URL: !Ref FrontendUrl
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource:
                - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:onboardingCredentials${Environment}-*
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Query
                - dynamodb:DeleteItem
              Resource:
                - !GetAtt OtpTable.Arn
        - VPCAccessPolicy: {}
      Events:
        VerifyOTP:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnboardingApi
            Path: /auth/verifyOTP
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - lambdas/auth/verifyOTP/app.ts
        External:
          - "@aws-sdk/*"

  LoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub onboardingLogin${Environment}
      CodeUri: ./
      Handler: lambdas/auth/login/app.lambdaHandler
      Description: POST /auth/login - validates credentials and returns JWT + HttpOnly refresh token cookie
      Environment:
        Variables:
          DB_SECRET_ID: !Sub onboardingCredentials${Environment}
          JWT_SECRET_ARN: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:onboardingJWT${Environment}
          REFRESH_TOKENS_TABLE_NAME: !Sub onboardingRefreshTokensDB${Environment}
          ONBOARDING_SALT_SECRET_ID: !Sub onboardingSalt${Environment}
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource:
                - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:onboardingCredentials${Environment}-*
                - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:onboardingJWT${Environment}-*
                - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:onboardingSalt${Environment}-*
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource:
                - !GetAtt RefreshTokensTable.Arn
        - VPCAccessPolicy: {}
      Events:
        Login:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnboardingApi
            Path: /auth/login
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - lambdas/auth/login/app.ts
        External:
          - "@aws-sdk/*"

  ValidateCredentialsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub onboardingValidateCredentials${Environment}
      CodeUri: ./
      Handler: lambdas/auth/validateCredentials/app.lambdaHandler
      Description: POST /auth/validateCredentials - verifies JWT and refresh token, returns email from token payload
      Environment:
        Variables:
          DB_SECRET_ID: !Sub onboardingCredentials${Environment}
          JWT_SECRET_ARN: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:onboardingJWT${Environment}
          REFRESH_TOKENS_TABLE_NAME: !Sub onboardingRefreshTokensDB${Environment}
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource:
                - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:onboardingCredentials${Environment}-*
                - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:onboardingJWT${Environment}-*
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource:
                - !GetAtt RefreshTokensTable.Arn
        - VPCAccessPolicy: {}
      Events:
        ValidateCredentials:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnboardingApi
            Path: /auth/validateCredentials
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - lambdas/auth/validateCredentials/app.ts
        External:
          - "@aws-sdk/*"

  ResetPasswordFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub onboardingResetPassword${Environment}
      CodeUri: ./
      Handler: lambdas/auth/resetPassword/app.lambdaHandler
      Description: POST /auth/resetPassword - validates recovery OTP and updates user password
      Environment:
        Variables:
          DB_SECRET_ID: !Sub onboardingCredentials${Environment}
          OTP_TABLE_NAME: !Sub onboardingOtpDB${Environment}
          ONBOARDING_SALT_SECRET_ID: !Sub onboardingSalt${Environment}
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource:
                - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:onboardingCredentials${Environment}-*
                - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:onboardingSalt${Environment}-*
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Query
                - dynamodb:DeleteItem
              Resource:
                - !GetAtt OtpTable.Arn
        - VPCAccessPolicy: {}
      Events:
        ResetPassword:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnboardingApi
            Path: /auth/resetPassword
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - lambdas/auth/resetPassword/app.ts
        External:
          - "@aws-sdk/*"

  RenewTokenFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub onboardingRenewToken${Environment}
      CodeUri: ./
      Handler: lambdas/auth/renewToken/app.lambdaHandler
      Description: POST /auth/renewToken - verifies refresh token, rotates it, and issues new access token
      Environment:
        Variables:
          DB_SECRET_ID: !Sub onboardingCredentials${Environment}
          JWT_SECRET_ARN: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:onboardingJWT${Environment}
          REFRESH_TOKENS_TABLE_NAME: !Sub onboardingRefreshTokensDB${Environment}
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource:
                - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:onboardingCredentials${Environment}-*
                - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:onboardingJWT${Environment}-*
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:DeleteItem
                - dynamodb:PutItem
              Resource:
                - !GetAtt RefreshTokensTable.Arn
        - VPCAccessPolicy: {}
      Events:
        RenewToken:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnboardingApi
            Path: /auth/renewToken
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - lambdas/auth/renewToken/app.ts
        External:
          - "@aws-sdk/*"

  GetCreditHistoryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub onboardingGetCreditHistory${Environment}
      CodeUri: ./
      Handler: lambdas/home/getCreditHistory/app.lambdaHandler
      Description: Internal only - scrapes portal and returns client credit history by RFC (no API Gateway trigger)
      Environment:
        Variables:
          PORTAL_SECRET_ARN: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:onboardingTP${Environment}
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource:
                - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:onboardingTP-*
        - VPCAccessPolicy: {}
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - lambdas/home/getCreditHistory/app.ts
        External:
          - "@aws-sdk/*"

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${OnboardingApi}.execute-api.${AWS::Region}.amazonaws.com"
  RegisterFunctionArn:
    Description: Register Lambda ARN
    Value: !GetAtt RegisterFunction.Arn
  GetCompaniesFunctionArn:
    Description: GetCompanies Lambda ARN
    Value: !GetAtt GetCompaniesFunction.Arn
