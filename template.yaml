AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: onboarding-back

Globals:
  Function:
    Runtime: nodejs22.x
    Architectures:
      - x86_64
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        NODE_OPTIONS: --enable-source-maps
    VpcConfig:
      SecurityGroupIds: !Split [",", !Ref LambdaSecurityGroupIds]
      SubnetIds: !Split [",", !Ref LambdaSubnetIds]

Parameters:
  LambdaSubnetIds:
    Type: String
    Description: Comma-separated list of private subnet IDs for Lambda VPC config
  LambdaSecurityGroupIds:
    Type: String
    Description: Comma-separated list of security group IDs for Lambda VPC config
  Environment:
    Type: String
    Description: Deployment environment (Dev, Prod)
    AllowedValues:
      - Dev
      - Prod
    Default: Dev
  FrontendUrl:
    Type: String
    Description: Frontend URL for CORS
    Default: http://localhost:3000
  DevTestRfc:
    Type: String
    Description: RFC de pruebas para dev — sustituye el RFC real al invocar getCreditHistory
    Default: ""
  DevUserId:
    Type: String
    Description: userId de pruebas para dev — bypass del authorizer context en SAM local
    Default: ""
  DevUserEmail:
    Type: String
    Description: email de pruebas para dev — bypass del authorizer context en SAM local
    Default: ""

Mappings:
  EnvLower:
    Dev:
      Value: dev
    Prod:
      Value: prod

Resources:
  CompaniesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub onboardingCompaniesDB${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  OtpTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub onboardingOtpDB${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: email
          AttributeType: S
        - AttributeName: otp_id
          AttributeType: S
      KeySchema:
        - AttributeName: email
          KeyType: HASH
        - AttributeName: otp_id
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  RefreshTokensTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub onboardingRefreshTokensDB${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: token_hash
          AttributeType: S
      KeySchema:
        - AttributeName: token_hash
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  CreditHistoryRequestsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub onboardingCreditHistoryRequestsDB${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  KycTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub onboardingKycDB${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: creditId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: creditId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: userId-index
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
  OnboardingApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      Auth:
        Authorizers:
          CredentialsAuthorizer:
            AuthorizerPayloadFormatVersion: "2.0"
            EnableSimpleResponses: true
            FunctionArn: !GetAtt ValidateCredentialsFunction.Arn
            Identity:
              ReauthorizeEvery: 0
              Headers:
                - Authorization
        DefaultAuthorizer: CredentialsAuthorizer
      CorsConfiguration:
        AllowOrigins:
          - !Ref FrontendUrl
        AllowHeaders:
          - Content-Type
          - Authorization
          - x-api-key
          - X-Requested-With
        AllowMethods:
          - POST
          - OPTIONS
        AllowCredentials: true

  RegisterFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub onboardingRegister${Environment}
      CodeUri: ./
      Handler: lambdas/auth/register/app.lambdaHandler
      Description: POST /auth/register - validates employee record and creates user account
      Environment:
        Variables:
          DB_SECRET_ID: !Sub onboardingCredentials${Environment}
          ONBOARDING_SALT_SECRET_ID: !Sub onboardingSalt${Environment}
          FRONTEND_URL: !Ref FrontendUrl
          COMPANIES_TABLE_NAME: !Sub onboardingCompaniesDB${Environment}
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource:
                - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:onboardingCredentials${Environment}-*
                - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:onboardingSalt${Environment}-*
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:Scan
              Resource:
                - !GetAtt CompaniesTable.Arn
        - VPCAccessPolicy: {}
      Events:
        Register:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnboardingApi
            Path: /auth/register
            Method: POST
            Auth:
              Authorizer: NONE
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - lambdas/auth/register/app.ts
        External:
          - "@aws-sdk/*"

  GetCompaniesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub onboardingGetCompanies${Environment}
      CodeUri: ./
      Handler: lambdas/auth/getCompanies/app.lambdaHandler
      Description: POST /auth/getCompanies - returns all companies from DynamoDB
      Environment:
        Variables:
          FRONTEND_URL: !Ref FrontendUrl
          COMPANIES_TABLE_NAME: !Sub onboardingCompaniesDB${Environment}
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Scan
              Resource:
                - !GetAtt CompaniesTable.Arn
        - VPCAccessPolicy: {}
      Events:
        GetCompanies:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnboardingApi
            Path: /auth/getCompanies
            Method: POST
            Auth:
              Authorizer: NONE
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - lambdas/auth/getCompanies/app.ts
        External:
          - "@aws-sdk/*"

  SendOTPFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub onboardingSendOTP${Environment}
      CodeUri: ./
      Handler: lambdas/auth/sendOTP/app.lambdaHandler
      Description: POST /auth/sendOTP - generates and sends OTP to user email
      Environment:
        Variables:
          DB_SECRET_ID: !Sub onboardingCredentials${Environment}
          OTP_TABLE_NAME: !Sub onboardingOtpDB${Environment}
          SES_FROM_EMAIL: no-reply@apoyoenelcamino.com.mx
          FRONTEND_URL: !Ref FrontendUrl
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource:
                - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:onboardingCredentials${Environment}-*
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:Query
              Resource:
                - !GetAtt OtpTable.Arn
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
              Resource: "*"
        - VPCAccessPolicy: {}
      Events:
        SendOTP:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnboardingApi
            Path: /auth/sendOTP
            Method: POST
            Auth:
              Authorizer: NONE
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - lambdas/auth/sendOTP/app.ts
        External:
          - "@aws-sdk/*"

  SendRecoveryOTPFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub onboardingSendRecoveryOTP${Environment}
      CodeUri: ./
      Handler: lambdas/auth/sendRecoveryOTP/app.lambdaHandler
      Description: POST /auth/sendRecoveryOTP - generates and sends recovery OTP for password reset
      Environment:
        Variables:
          DB_SECRET_ID: !Sub onboardingCredentials${Environment}
          OTP_TABLE_NAME: !Sub onboardingOtpDB${Environment}
          SES_FROM_EMAIL: no-reply@apoyoenelcamino.com.mx
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource:
                - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:onboardingCredentials${Environment}-*
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:Query
              Resource:
                - !GetAtt OtpTable.Arn
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
              Resource: "*"
        - VPCAccessPolicy: {}
      Events:
        SendRecoveryOTP:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnboardingApi
            Path: /auth/sendRecoveryOTP
            Method: POST
            Auth:
              Authorizer: NONE
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - lambdas/auth/sendRecoveryOTP/app.ts
        External:
          - "@aws-sdk/*"

  VerifyOTPFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub onboardingVerifyOTP${Environment}
      CodeUri: ./
      Handler: lambdas/auth/verifyOTP/app.lambdaHandler
      Description: POST /auth/verifyOTP - verifies OTP code and marks user as verified
      Environment:
        Variables:
          DB_SECRET_ID: !Sub onboardingCredentials${Environment}
          OTP_TABLE_NAME: !Sub onboardingOtpDB${Environment}
          FRONTEND_URL: !Ref FrontendUrl
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource:
                - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:onboardingCredentials${Environment}-*
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Query
                - dynamodb:DeleteItem
              Resource:
                - !GetAtt OtpTable.Arn
        - VPCAccessPolicy: {}
      Events:
        VerifyOTP:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnboardingApi
            Path: /auth/verifyOTP
            Method: POST
            Auth:
              Authorizer: NONE
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - lambdas/auth/verifyOTP/app.ts
        External:
          - "@aws-sdk/*"

  LoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub onboardingLogin${Environment}
      CodeUri: ./
      Handler: lambdas/auth/login/app.lambdaHandler
      Description: POST /auth/login - validates credentials and returns JWT + HttpOnly refresh token cookie
      Environment:
        Variables:
          DB_SECRET_ID: !Sub onboardingCredentials${Environment}
          JWT_SECRET_ARN: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:onboardingJWT${Environment}
          REFRESH_TOKENS_TABLE_NAME: !Sub onboardingRefreshTokensDB${Environment}
          ONBOARDING_SALT_SECRET_ID: !Sub onboardingSalt${Environment}
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource:
                - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:onboardingCredentials${Environment}-*
                - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:onboardingJWT${Environment}-*
                - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:onboardingSalt${Environment}-*
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource:
                - !GetAtt RefreshTokensTable.Arn
        - VPCAccessPolicy: {}
      Events:
        Login:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnboardingApi
            Path: /auth/login
            Method: POST
            Auth:
              Authorizer: NONE
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - lambdas/auth/login/app.ts
        External:
          - "@aws-sdk/*"

  ValidateCredentialsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub onboardingValidateCredentials${Environment}
      CodeUri: ./
      Handler: lambdas/auth/validateCredentials/app.lambdaHandler
      Description: Lambda authorizer - verifies JWT and refresh token binding for protected routes
      Environment:
        Variables:
          JWT_SECRET_ARN: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:onboardingJWT${Environment}
          REFRESH_TOKENS_TABLE_NAME: !Sub onboardingRefreshTokensDB${Environment}
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource:
                - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:onboardingJWT${Environment}-*
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource:
                - !GetAtt RefreshTokensTable.Arn
        - VPCAccessPolicy: {}
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - lambdas/auth/validateCredentials/app.ts
        External:
          - "@aws-sdk/*"

  ResetPasswordFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub onboardingResetPassword${Environment}
      CodeUri: ./
      Handler: lambdas/auth/resetPassword/app.lambdaHandler
      Description: POST /auth/resetPassword - validates recovery OTP and updates user password
      Environment:
        Variables:
          DB_SECRET_ID: !Sub onboardingCredentials${Environment}
          OTP_TABLE_NAME: !Sub onboardingOtpDB${Environment}
          ONBOARDING_SALT_SECRET_ID: !Sub onboardingSalt${Environment}
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource:
                - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:onboardingCredentials${Environment}-*
                - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:onboardingSalt${Environment}-*
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Query
                - dynamodb:DeleteItem
              Resource:
                - !GetAtt OtpTable.Arn
        - VPCAccessPolicy: {}
      Events:
        ResetPassword:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnboardingApi
            Path: /auth/resetPassword
            Method: POST
            Auth:
              Authorizer: NONE
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - lambdas/auth/resetPassword/app.ts
        External:
          - "@aws-sdk/*"

  RenewTokenFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub onboardingRenewToken${Environment}
      CodeUri: ./
      Handler: lambdas/auth/renewToken/app.lambdaHandler
      Description: POST /auth/renewToken - verifies refresh token, rotates it, and issues new access token
      Environment:
        Variables:
          DB_SECRET_ID: !Sub onboardingCredentials${Environment}
          JWT_SECRET_ARN: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:onboardingJWT${Environment}
          REFRESH_TOKENS_TABLE_NAME: !Sub onboardingRefreshTokensDB${Environment}
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource:
                - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:onboardingCredentials${Environment}-*
                - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:onboardingJWT${Environment}-*
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:DeleteItem
                - dynamodb:PutItem
              Resource:
                - !GetAtt RefreshTokensTable.Arn
        - VPCAccessPolicy: {}
      Events:
        RenewToken:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnboardingApi
            Path: /auth/renewToken
            Method: POST
            Auth:
              Authorizer: NONE
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - lambdas/auth/renewToken/app.ts
        External:
          - "@aws-sdk/*"

  GetCreditHistoryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub onboardingGetCreditHistory${Environment}
      CodeUri: ./
      Handler: lambdas/home/getCreditHistory/app.lambdaHandler
      Description: Internal only - scrapes portal and returns client credit history by RFC (no API Gateway trigger)
      Timeout: 300
      MemorySize: 1024
      Environment:
        Variables:
          PORTAL_SECRET_ARN: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:onboardingTP
      VpcConfig:
        SecurityGroupIds: !Ref AWS::NoValue
        SubnetIds: !Ref AWS::NoValue
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource:
                - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:onboardingTP-*
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - lambdas/home/getCreditHistory/app.ts
        External:
          - "@aws-sdk/*"

  RequestCreditHistoryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub onboardingRequestCreditHistory${Environment}
      CodeUri: ./
      Handler: lambdas/home/requestCreditHistory/app.lambdaHandler
      Description: Verifies RFC against JWT, enforces 30-day cooldown, invokes getCreditHistory
      Environment:
        Variables:
          DB_SECRET_ID: !Sub onboardingCredentials${Environment}
          CREDIT_HISTORY_REQUESTS_TABLE_NAME: !Sub onboardingCreditHistoryRequestsDB${Environment}
          GET_CREDIT_HISTORY_FUNCTION_NAME: !Sub onboardingGetCreditHistory${Environment}
          DEV_TEST_RFC: !Ref DevTestRfc
          DEV_USER_ID: !Ref DevUserId
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:onboardingCredentials${Environment}-*
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
              Resource: !GetAtt CreditHistoryRequestsTable.Arn
        - Statement:
            - Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource: !GetAtt GetCreditHistoryFunction.Arn
        - VPCAccessPolicy: {}
      Events:
        RequestCreditHistory:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnboardingApi
            Path: /home/credit
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - lambdas/home/requestCreditHistory/app.ts
        External:
          - "@aws-sdk/*"

  GetUserInfoFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub onboardingGetUserInfo${Environment}
      CodeUri: ./
      Handler: lambdas/home/getUserInfo/app.lambdaHandler
      Description: Returns user info from auth context
      Environment:
        Variables:
          DEV_USER_EMAIL: !Ref DevUserEmail
      Policies:
        - VPCAccessPolicy: {}
      Events:
        GetUserInfo:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnboardingApi
            Path: /home/user/info
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - lambdas/home/getUserInfo/app.ts
        External:
          - "@aws-sdk/*"

  CreditConditionsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub onboardingCreditConditions${Environment}
      CodeUri: ./
      Handler: lambdas/kyc/creditConditions/app.lambdaHandler
      Description: POST /kyc/credit/conditions - validates monto and plazo against credit offer and initializes KYC process
      Environment:
        Variables:
          CREDIT_HISTORY_REQUESTS_TABLE_NAME: !Sub onboardingCreditHistoryRequestsDB${Environment}
          KYC_TABLE_NAME: !Sub onboardingKycDB${Environment}
          DEV_USER_ID: !Ref DevUserId
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource: !GetAtt CreditHistoryRequestsTable.Arn
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource: !GetAtt KycTable.Arn
        - VPCAccessPolicy: {}
      Events:
        CreditConditions:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnboardingApi
            Path: /kyc/credit/conditions
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - lambdas/kyc/creditConditions/app.ts
        External:
          - "@aws-sdk/*"

  GetKycStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub onboardingGetKycStatus${Environment}
      CodeUri: ./
      Handler: lambdas/kyc/getKycStatus/app.lambdaHandler
      Description: POST /kyc/status - retrieves existing KYC process for authenticated user
      Environment:
        Variables:
          KYC_TABLE_NAME: !Sub onboardingKycDB${Environment}
          DEV_USER_ID: !Ref DevUserId
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Query
              Resource:
                - !GetAtt KycTable.Arn
                - !Sub '${KycTable.Arn}/index/userId-index'
        - VPCAccessPolicy: {}
      Events:
        GetKycStatus:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnboardingApi
            Path: /kyc/status
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - lambdas/kyc/getKycStatus/app.ts
        External:
          - "@aws-sdk/*"

  GetUploadUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub onboardingGetUploadUrl${Environment}
      CodeUri: ./
      Handler: lambdas/kyc/getUploadUrl/app.lambdaHandler
      Description: POST /kyc/upload-url - generates presigned S3 PUT URL for the current KYC document step
      Environment:
        Variables:
          KYC_TABLE_NAME: !Sub onboardingKycDB${Environment}
          S3_BUCKET_NAME: !Sub
            - acamino-file-system-${EnvLow}
            - EnvLow: !FindInMap [EnvLower, !Ref Environment, Value]
          DEV_USER_ID: !Ref DevUserId
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Query
              Resource:
                - !GetAtt KycTable.Arn
                - !Sub '${KycTable.Arn}/index/userId-index'
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:UpdateItem
              Resource:
                - !GetAtt KycTable.Arn
        - Statement:
            - Effect: Allow
              Action:
                - s3:PutObject
              Resource: !Sub
                - 'arn:aws:s3:::acamino-file-system-${EnvLow}/onboarding/*'
                - EnvLow: !FindInMap [EnvLower, !Ref Environment, Value]
        - VPCAccessPolicy: {}
      Events:
        GetUploadUrl:
          Type: HttpApi
          Properties:
            ApiId: !Ref OnboardingApi
            Path: /kyc/upload-url
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - lambdas/kyc/getUploadUrl/app.ts
        External:
          - "@aws-sdk/*"

  ValidateIneFrontFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub onboardingValidateIneFront${Environment}
      CodeUri: ./
      Handler: lambdas/kyc/validateIneFront/app.lambdaHandler
      Description: POST /kyc/validate-ine-front - analyzes INE front document with Textract and advances KYC step
      Environment:
        Variables:
          KYC_TABLE_NAME: !Sub onboardingKycDB${Environment}
          S3_BUCKET_NAME: !Sub
            - acamino-file-system-${EnvLow}
            - EnvLow: !FindInMap [EnvLower, !Ref Environment, Value]
          DB_SECRET_ID: !Sub onboardingCredentials${Environment}
          DEV_USER_ID: !Ref DevUserId
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
